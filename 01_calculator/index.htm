<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
      <div class="calc_box">
        <div class="input"><input type="text" placeholder="0" id="display" disabled></div>
        <div class="button">
            <button class="opt" onclick="clearDisplay()">AC</button>
            <button class="opt" onclick="clearLast()">C</button>
            <button class="opt" onclick="percent()">%</button>
            <button class="opt" onclick="append('/')">/</button>
        </div>
        <div class="button">
            <button onclick="append('9')">9</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('7')">7</button>
            <button class="opt" onclick="append('*')">*</button>
        </div>
        <div class="button">
            <button onclick="append('6')">6</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('4')">4</button>
            <button class="opt" onclick="append('-')">-</button>
        </div>
        <div class="button">
            <button onclick="append('3')">3</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('1')">1</button>
            <button class="opt" onclick="append('+')">+</button>
        </div>
        <div class="button">
            <button onclick="append('00')">00</button>
            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button class="equalbtn"onclick="calculate()">=</button>
        </div>
      </div>
    <script src="index.js"></script>
</body>
</html>
