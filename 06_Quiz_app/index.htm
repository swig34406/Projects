<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
        <div class="head">Questions</div>
      <div class="question"></div>
      <div class="options">
        <div><input type="radio" class="option" id="op1" name="j"/> <label for="op1" class="o1"></label></div>
        <div><input type="radio" class="option" id="op2" name="j"/> <label for="op2" class="o2"></label></div>
        <div><input type="radio" class="option" id="op3" name="j"/> <label for="op3" class="o3"></label></div>
        <div><input type="radio" class="option" id="op4" name="j" /> <label for="op4" class="o4"></label></div>
      </div>
      <div class="buttons">
        <button class="back">Back</button>
        <button class="next">Next</button>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
